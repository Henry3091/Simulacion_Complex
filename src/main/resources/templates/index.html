<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Simulador</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4 text-center" style="max-width: 600px; width: 100%;">

        <!-- RESULTADO FINAL -->
        <div th:if="${final}">
            <h2 class="display-5">🎉 Examen terminado</h2>
            <p class="fs-4">
                Puntaje: <span th:text="${puntaje}"></span>
            </p>
            <a href="/" class="btn btn-primary btn-lg">Reiniciar</a>
        </div>

        <!-- PREGUNTA -->
        <div th:if="${pregunta != null}">

            <h3 class="fs-3">
                Pregunta <span th:text="${indice + 1}"></span>
            </h3>

            <h2 class="fw-bold mb-4" th:text="${pregunta.enunciado}"></h2>

            <!-- RESULTADO -->
            <div th:if="${mostrarResultado}">
                <h3 class="mb-3"
                    th:classappend="${correcta} ? 'text-success' : 'text-danger'"
                    th:text="${correcta} ? '✅ Correcto' : '❌ Incorrecto'">
                </h3>
                <p class="fs-5">
                    Respuesta correcta:
                    <strong th:text="${respuestaCorrecta}" class="text-success"></strong>
                </p>

                <form th:action="@{/siguiente}" method="post">
                    <button class="btn btn-primary btn-lg" type="submit">
                        Siguiente
                    </button>
                </form>
            </div>

            <!-- OPCIONES -->
            <div th:if="${mostrarResultado == null or !mostrarResultado}">
                <div th:each="opcion : ${pregunta.opciones}">
                    <form th:action="@{/validar}" method="post">
                        <input type="hidden" name="seleccion" th:value="${opcion}" />
                        <button class="btn btn-outline-dark btn-lg w-100 mb-2"
                                type="submit"
                                th:text="${opcion}">
                        </button>
                    </form>
                </div>
            </div>

        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
